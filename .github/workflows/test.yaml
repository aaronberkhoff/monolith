name: Run Tests with Coverage

on:
  push:
    branches:
  pull_request:
    branches: [dev]
  # Publish on version tag push (e.g., v1.0.0)

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MonoHome: ${{ github.workspace }}

    steps:
      # --- Setup ---
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov make cmake python3-dev libeigen3-dev
          curl -sSLo build-wrapper-linux-x86.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip build-wrapper-linux-x86.zip
          sudo mv build-wrapper-linux-x86/* /usr/local/bin/

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          poetry install --with dev --no-interaction
          pip install pybind11

      - name: Install Spice
        run: poetry run make spice

      # --- Build C++ extension with coverage flags ---
      - name: Build C++ extensions
        run: |
          poetry run make clean
          poetry run make all

      # --- Run tests (Python + C++) ---
      - name: Run pytest with coverage
        run: |
          poetry run pytest --cov=monolith --cov-report=xml --cov-report=term-missing

