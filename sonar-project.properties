# SonarCloud project identification
sonar.organization=aaronberkhoff
sonar.projectKey=aaronberkhoff_monolith

# Project metadata
sonar.projectName=Monolith
sonar.projectVersion=1.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Sources and tests
sonar.sources=python,cpp/src
sonar.tests=python/tests

# Exclusions (things we don’t want to scan)
sonar.exclusions=**/__pycache__/**,**/*.pyi,cpp/bindings/**

# Python coverage (pytest generates coverage.xml)
sonar.python.coverage.reportPaths=coverage.xml

# C++ analysis (build-wrapper output)
sonar.cfamily.build-wrapper-output=build_wrapper_output

# Optional: include C++ coverage (lcov output)
sonar.cfamily.gcov.reportsPath=.

# Test inclusions
sonar.test.inclusions=python/tests/**
